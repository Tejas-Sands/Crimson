<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crimson Awakening</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        font-family: 'Courier New', Courier, monospace;
        color: white;
      }
      
      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Loader Overlay */
      #loader {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #050000;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 0.8s ease-out;
      }
      
      .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(139, 0, 0, 0.2);
        border-top-color: #e74c3c;
        border-radius: 50%;
        animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        margin-bottom: 24px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        color: #e74c3c;
        font-family: 'Courier New', Courier, monospace;
        letter-spacing: 4px;
        font-weight: bold;
        font-size: 18px;
        animation: pulse 1.5s ease-in-out infinite;
        margin-bottom: 10px;
      }
      
      .loading-tip {
        color: #aaa;
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        font-style: italic;
        text-align: center;
        max-width: 80%;
        margin-top: 15px;
      }
      
      .progress-bar-container {
        width: 220px;
        height: 4px;
        background: rgba(139, 0, 0, 0.2);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 15px;
      }
      
      .progress-bar-fill {
        height: 100%;
        background: #e74c3c;
        width: 0%;
        transition: width 0.4s cubic-bezier(0.1, 0.8, 0.25, 1);
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      /* HUD Overlay */
      #hud-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* Let clicks pass through to canvas */
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .hud-top {
        display: flex;
        justify-content: space-between;
        padding: 20px;
      }

      .hud-panel {
        background: rgba(20, 0, 0, 0.7);
        border: 1px solid #500;
        padding: 10px 20px;
        border-radius: 4px;
        min-width: 200px;
      }

      .health-row, .blood-row {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      .icon {
        width: 24px;
        height: 24px;
        margin-right: 15px;
        background-size: contain;
        background-repeat: no-space;
        display: inline-block;
      }

      .health-text {
        color: #e74c3c;
        font-size: 24px;
        font-weight: bold;
      }

      .blood-bar-container {
        width: 160px;
        height: 20px;
        border: 1px solid #500;
        background: rgba(40, 0, 0, 0.5);
      }

      .blood-bar-fill {
        height: 100%;
        background: #b00;
        transition: width 0.2s, background-color 0.2s;
      }

      .hud-bottom {
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      .ability-slot {
        width: 60px;
        height: 60px;
        background: rgba(20, 20, 20, 0.8);
        border: 1px solid #600;
        margin: 0 10px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding-top: 5px;
        padding-bottom: 5px;
        box-sizing: border-box;
      }

      .ability-slot.active {
        background: rgba(60, 0, 0, 0.8);
      }

      .ability-key {
        font-size: 14px;
        color: #aaa;
      }

      .ability-name {
        font-size: 12px;
        color: #666;
      }
      
      .ability-slot.active .ability-name {
        color: #fff;
      }

      .cooldown-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.7);
        height: 0%;
      }
    </style>
    <script>
      window.addEventListener('error', function(e) {
        const errDiv = document.createElement('div');
        errDiv.style.color = '#ff4d4d';
        errDiv.style.marginTop = '20px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '14px';
        errDiv.style.padding = '10px';
        errDiv.style.border = '1px solid #ff4d4d';
        errDiv.style.background = 'rgba(255,0,0,0.1)';
        errDiv.innerText = 'CRASH: ' + e.message + '\nLine: ' + e.lineno + ' in ' + e.filename;
        document.getElementById('loader').appendChild(errDiv);
      });
    </script>
    <script type="module" crossorigin src="/assets/index-BP9Z7hFz.js"></script>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
      <div class="loading-text">AWAKENING...</div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="loading-tip" id="loading-tip"></div>
    </div>

    <div id="game-container">
      <canvas id="gameCanvas"></canvas>
      
      <div id="hud-layer">
        <div class="hud-top">
          <div class="hud-panel">
            <div class="health-row">
              <span class="icon" id="heart-icon"></span>
              <span class="health-text" id="health-value">100 / 100</span>
            </div>
            <div class="blood-row">
              <span class="icon" id="blood-icon"></span>
              <div class="blood-bar-container">
                <div class="blood-bar-fill" id="blood-fill" style="width: 0%;"></div>
              </div>
            </div>
          </div>
          
          <div class="hud-panel" style="text-align: center;">
            <div id="time-value" style="font-size: 20px; color: #f39c12; margin-top: 5px;">DAYTIME</div>
          </div>
        </div>
        
        <div class="hud-bottom" id="abilities-container">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
    
  </body>
</html>
